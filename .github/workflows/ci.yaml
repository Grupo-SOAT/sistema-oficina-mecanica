name: Workflow Sistema Oficina Mecanica

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:

  build-and-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run mvn generate sources
        run: mvn generate-sources
      
      - name: Compile Code
        run: |
          echo "Compilando..."
          mvn compile
          echo "Build finalizado!"
          echo "Código compilado com sucesso!"

  validate-tests:
    runs-on: ubuntu-latest
    needs: build-and-compile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Coverage
        run: | 
          mvn clean verify
          echo "Testes finalizados. Fazendo upload do relatório..."

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
