name: Relatorio OWASP

on:
  workflow_dispatch:

jobs:
  owasp-analysis:
    name: OWASP Dependency Check + ZAP
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: workshop
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # 🧪 BUILD
      # =========================
      - name: Build application
        run: mvn clean package -DskipTests

      # =========================
      # 🔐 OWASP Dependency Check
      # =========================
      # Cache
      - name: Cache OWASP data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp
          key: owasp-${{ runner.os }}-v3

      # Tenta atualizar (pode falhar)
      - name: Update OWASP DB (best effort)
        run: |
          mvn org.owasp:dependency-check-maven:update-only \
            -DfailOnError=false

      # Executa com base local
      - name: Run OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DautoUpdate=false \
            -DfailOnError=false \
            -Dformats=HTML,JSON

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: target/dependency-check-report.*

      - name: Install postgres client
        run: sudo apt-get install -y postgresql-client

      # =========================
      # 🚀 SUBIR APP + TOKEN
      # =========================
      - name: Start app and get JWT
        run: bash scripts/owasp-zap-up-app-local.sh

      # =========================
      # 🕷️ OWASP ZAP
      # =========================
      - name: Run OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:8080'
          format: 'html'
          output: 'zap-report.html'
          cmd_options: >
            -a
            -z "-config replacer.full_list(0).description=auth
                -config replacer.full_list(0).enabled=true
                -config replacer.full_list(0).matchtype=REQ_HEADER
                -config replacer.full_list(0).matchstr=Authorization
                -config replacer.full_list(0).replacement=Bearer ${{ env.ZAP_AUTH_TOKEN }}"

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html