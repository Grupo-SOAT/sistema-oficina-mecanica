name: Relatorio OWASP | Trivy | ZAP

on:
  workflow_dispatch:

jobs:
  security-analysis:
    name: Security Scan (Trivy + OWASP + ZAP)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: workshop
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # 🧪 BUILD
      # =========================
      - name: Build application
        run: mvn clean package -DskipTests

      # =========================
      # 🔐 TRIVY (scanner principal)
      # =========================
      - name: Run Trivy (table report)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          vuln-type: 'library'
          ignore-unfixed: true
          exit-code: '0'

      - name: Run Trivy (JSON report)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-report.json'
          vuln-type: 'library'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

      # =========================
      # 🔐 OWASP (best effort)
      # =========================
      - name: Run OWASP Dependency Check (try)
        continue-on-error: true
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailOnError=false \
            -Dformats=HTML,JSON

      - name: Upload OWASP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: target/dependency-check-report.*

      - name: Install postgres client
        run: sudo apt-get install -y postgresql-client

      # =========================
      # 🚀 SUBIR APP + TOKEN
      # =========================
      - name: Start app and get JWT
        run: bash scripts/owasp-zap-up-app-local.sh
      
      - name: Setup workspace permissions for ZAP
        run: |
          chmod -R 777 ${{ github.workspace }}
          echo "Permissões para OWASP ZAP configuradas no runner."

      # =========================
      # 🕷️ OWASP ZAP
      # =========================
      - name: Run OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:8080'
          cmd_options: '-a'
          allow_issue_writing: false
        env:
          ZAP_AUTH_HEADER: Authorization
          ZAP_AUTH_HEADER_VALUE: Bearer ${{ env.ZAP_AUTH_TOKEN }}
          ZAP_AUTH_HEADER_SITE: http://localhost:8080

      - name: Debug - list generated files
        run: ls -la

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html