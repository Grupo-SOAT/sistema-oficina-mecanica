name: Cucumber Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  cucumber:
    name: Execute Cucumber
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Aguarda Postgres subir
        run: sleep 15

      - name: Rodar testes Cucumber (profile test)
        run: |
          mvn clean test \
          -Dspring.profiles.active=test \
          -Dcucumber.plugin="pretty,html:target/cucumber-report.html,json:target/cucumber-report.json"

      - name: Upload relatório HTML
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-report.html

      - name: Upload relatório JSON
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-json
          path: target/cucumber-report.json
