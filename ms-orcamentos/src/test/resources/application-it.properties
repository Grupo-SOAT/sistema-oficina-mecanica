# Spring Boot IT Configuration - Testcontainers (Postgres + Kafka + Mailpit)

# Neste servico de producao o acesso ao Postgres e somente-leitura (spring.datasource.hikari.read-only=true
# e ddl-auto=none), pois quem possui o schema e o monolito. Nos testes de integracao usamos um Postgres
# efemero proprio (Testcontainers), entao aqui - e apenas aqui - habilitamos escrita para o Hibernate
# criar o schema e os testes semearem os dados de fixture via JdbcTemplate.
spring.datasource.hikari.read-only=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

logging.level.root=WARN
logging.level.br.com.fiap.postech.msorcamentos=INFO
