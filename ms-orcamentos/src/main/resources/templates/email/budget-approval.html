<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Orcamento da Ordem de Servico</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 24px;">
    <div style="max-width: 480px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; padding: 24px;">
        <h2 style="color: #2c3e50;">Ola, <span th:text="${clientName}">Cliente</span>!</h2>

        <p>
            O orcamento da Ordem de Servico <strong th:text="'#' + ${serviceOrderId}">#0</strong>
            ja esta disponivel para sua avaliacao.
        </p>

        <p>
            <strong>Descricao:</strong> <span th:text="${description}">-</span><br/>
            <strong>Valor estimado:</strong>
            <span th:text="'R$ ' + ${#numbers.formatDecimal(estimatedAmount, 1, 2)}">R$ 0,00</span>
        </p>

        <p>Clique no botao abaixo para aprovar, recusar ou cancelar o orcamento:</p>

        <p style="text-align: center; margin: 32px 0;">
            <a th:href="${decisionLink}"
               style="background-color: #2c3e50; color: #ffffff; padding: 12px 24px; text-decoration: none; border-radius: 4px;">
                Ver orcamento e decidir
            </a>
        </p>

        <p style="font-size: 12px; color: #888888;">
            Se voce nao solicitou este orcamento, ignore este e-mail.
        </p>
    </div>
</body>
</html>
