server.port=8081

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# DataSource (mesmo banco "workshop" do monolito, acesso somente leitura)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/workshop}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.read-only=true

# JPA/Hibernate - nunca gerencia schema, este servico so le dados
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.admin.fail-fast=false
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:ms-orcamentos-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.budget.kafka.topic.request=${APP_BUDGET_KAFKA_TOPIC_REQUEST:budget-approval-request}
app.budget.kafka.topic.decision=${APP_BUDGET_KAFKA_TOPIC_DECISION:budget-decision}

# E-mail (Mailpit)
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

app.budget.mail.from=${APP_BUDGET_MAIL_FROM:orcamentos@oficina-mecanica.com.br}

# Base URL usada para montar o link magico enviado por e-mail
app.budget.base-url=${APP_BUDGET_BASE_URL:http://localhost:8081}
