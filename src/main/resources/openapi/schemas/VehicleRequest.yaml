title: Request de veículo
description: Dados para criar ou atualizar um veículo (`ownerId` sempre tem prioridade sobre `owner`)
type: object
required: [ licensePlate, brand, model, year, color ]
properties:
  licensePlate: { type: string }
  owner: { $ref: './OwnerRequest.yaml' }
  ownerId: { type: integer, format: int64 }
  brand: { type: string }
  model: { type: string }
  year: { type: integer }
  color: { type: string }
