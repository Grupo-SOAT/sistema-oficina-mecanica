get:
  tags: [ Supplies ]
  summary: Obter insumo por ID
  operationId: getSupplyById
  security:
    - SessionToken: [ ]
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: integer, format: int64 }
  responses:
    '200':
      description: Recurso
      content:
        application/json:
          schema:
            $ref: '../schemas/SupplyData.yaml'
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '404':
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

patch:
  tags: [ Supplies ]
  summary: Atualizar insumo
  operationId: updateSupply
  security:
    - SessionToken: [ ]
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: integer, format: int64 }
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/SupplyData.yaml'
  responses:
    '200':
      description: Recurso
      content:
        application/json:
          schema:
            $ref: '../schemas/SupplyData.yaml'
    '400':
      description: Inválido
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '404':
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '409':
      description: Conflito
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

delete:
  tags: [ Supplies ]
  summary: Deletar insumo
  operationId: deleteSupply
  security:
    - SessionToken: [ ]
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: integer, format: int64 }
  responses:
    '202':
      description: Aceito
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '404':
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
