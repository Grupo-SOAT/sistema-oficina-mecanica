get:
  tags: [ Purchase Orders ]
  summary: Obter pedido de compra por ID
  operationId: getPurchaseOrderById
  security:
    - SessionToken: [ ]
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: integer, format: int64 }
  responses:
    '200':
      description: Recurso
      content:
        application/json:
          schema:
            $ref: '../schemas/PurchaseOrderData.yaml'
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '404':
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

patch:
  tags: [ Purchase Orders ]
  summary: Atualizar pedido de compra
  operationId: updatePurchaseOrder
  security:
    - SessionToken: [ ]
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: integer, format: int64 }
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/PurchaseOrderData.yaml'
  responses:
    '200':
      description: Recurso
      content:
        application/json:
          schema:
            $ref: '../schemas/PurchaseOrderData.yaml'
    '400':
      description: Inválido
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '404':
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '409':
      description: Conflito
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

delete:
  tags: [ Purchase Orders ]
  summary: Deletar pedido de compra
  operationId: deletePurchaseOrder
  security:
    - SessionToken: [ ]
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: integer, format: int64 }
  responses:
    '202':
      description: Aceito
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '404':
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
