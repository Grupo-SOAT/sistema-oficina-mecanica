get:
  tags: [ Service Orders ]
  summary: Listar Ordens de Serviço (paginado)
  description: >
    Quando nenhum filtro de status é informado (listagem padrão), as OS com status COMPLETED e DELIVERED são
    excluídas do resultado, e a ordenação segue a prioridade: IN_PROGRESS > AWAITING_APPROVAL > IN_INSPECTION >
    PENDING > demais status ativos. Dentro de um mesmo status, as OS mais antigas aparecem primeiro. Ao informar
    o filtro status, a busca retorna exatamente as OS daquele status, ordenadas por id ascendente.
  operationId: listServiceOrders
  security:
    - SessionToken: [ ]
  parameters:
    - in: query
      name: status
      description: Status da OS. Quando omitido, aplica-se a regra de ordenação/exclusão da listagem padrão.
      schema: { $ref: '../schemas/ServiceOrderStatus.yaml' }
    - in: query
      name: clientId
      description: ID do cliente
      schema: { type: integer, format: int64 }
    - in: query
      name: vehicleId
      description: ID do veículo
      schema: { type: integer, format: int64 }
    - in: query
      name: pageSize
      description: Tamanho da página
      schema: { type: integer, default: 10 }
    - in: query
      name: cursor
      description: Cursor da paginação (obtido através da página anterior)
      schema: { type: string }
  responses:
    '200':
      description: Busca paginada
      content:
        application/json:
          schema:
            $ref: '../schemas/PaginatedServiceOrderResponse.yaml'
    '204':
      description: Sem resultados
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

post:
  tags: [ Service Orders ]
  summary: Criar nova Ordem de Serviço
  operationId: createServiceOrder
  security:
    - SessionToken: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/ServiceOrderRequest.yaml'
  responses:
    '201':
      description: OS criada
      content:
        application/json:
          schema:
            $ref: '../schemas/ServiceOrderData.yaml'
    '400':
      description: Inválido
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
