get:
  tags: [ Services ]
  summary: Listar serviços de uma OS (paginado)
  operationId: listServices
  security:
    - SessionToken: []

  parameters:
    - in: path
      name: id
      description: ID da OS
      required: true
      schema:
        type: integer
        format: int64

    - in: query
      name: serviceId
      description: ID do Serviço
      schema:
        type: integer
        format: int64

    - in: query
      name: status
      description: Status do Serviço
      schema:
        $ref: '../schemas/ServiceStatus.yaml'

    - in: query
      name: pageSize
      description: Tamanho da página
      schema:
        type: integer
        default: 10

    - in: query
      name: cursor
      description: Cursor da paginação
      schema:
        type: string

  responses:
    '200':
      description: Busca paginada

post:
  tags: [ Services ]
  summary: Incluir novo Serviço na OS
  operationId: includeService
  security:
    - SessionToken: []

  parameters:
    - in: path
      name: id
      description: ID da OS
      required: true
      schema:
        type: integer
        format: int64

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/ServiceRequest.yaml'

  responses:
    '201':
      description: Serviço criado
