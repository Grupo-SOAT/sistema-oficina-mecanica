get:
  tags: [ Reports ]
  summary: Tempo médio de execução de um serviço
  operationId: getServiceAverageTime
  security:
    - SessionToken: [ ]
  parameters:
    - in: path
      name: id
      description: ID do serviço de catálogo (não confundir com o id do serviço de uma OS)
      required: true
      schema: { type: integer, format: int64 }
  responses:
    '200':
      description: Relatório do tempo médio
      content:
        application/pdf:
          schema:
            type: string
            format: binary
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '404':
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
