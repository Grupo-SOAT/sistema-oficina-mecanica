get:
  tags: [ Services ]
  summary: Listar serviços catalogados (paginado)
  operationId: listCatalogServices
  security:
    - SessionToken: [ ]
  responses:
    '200':
      description: Lista de serviços
      content:
        application/json:
          schema:
            $ref: '../schemas/PaginatedCatalogServiceResponse.yaml'
    '204':
      description: Sem resultados
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

post:
  tags: [ Services ]
  summary: Criar novo serviço catalogado
  operationId: createCatalogService
  security:
    - SessionToken: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/CatalogServiceRequest.yaml'
  responses:
    '201':
      description: Serviço criado
      content:
        application/json:
          schema:
            $ref: '../schemas/CatalogServiceData.yaml'
    '400':
      description: Inválido
      application/json:
        schema:
          $ref: '../schemas/ErrorResponse.yaml'
    '401':
      description: Não autenticado
      application/json:
        schema:
          $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      application/json:
        schema:
          $ref: '../schemas/ErrorResponse.yaml'
    '409':
      description: Conflito
      application/json:
        schema:
          $ref: '../schemas/ErrorResponse.yaml'

