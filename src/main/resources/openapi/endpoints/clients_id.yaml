get:
  tags: [ Clients ]
  summary: Obter cliente por ID
  operationId: getClientById
  security:
    - SessionToken: [ ]
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: integer, format: int64 }
  responses:
    '200':
      description: Recurso
      content:
        application/json:
          schema:
            $ref: '../schemas/ClientData.yaml'
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '404':
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

patch:
  tags: [ Clients ]
  summary: Atualizar cliente
  operationId: updateClient
  security:
    - SessionToken: [ ]
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: integer, format: int64 }
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/ClientData.yaml'
  responses:
    '200':
      description: Recurso
      content:
        application/json:
          schema:
            $ref: '../schemas/ClientData.yaml'
    '400':
      description: Inválido
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '404':
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '409':
      description: Conflito
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

delete:
  tags: [ Clients ]
  summary: Deletar cliente
  operationId: deleteClient
  security:
    - SessionToken: [ ]
  parameters:
    - in: path
      name: id
      required: true
      schema: { type: integer, format: int64 }
  responses:
    '202':
      description: Aceito
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
    '404':
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
