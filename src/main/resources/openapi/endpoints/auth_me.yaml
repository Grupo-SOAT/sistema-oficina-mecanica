get:
  tags: [ Authentication ]
  summary: Obter dados do usuário autenticado
  operationId: getCurrentUser
  security:
    - SessionToken: [ ]
  responses:
    '200':
      description: Dados do usuário
      $ref: '../schemas/UserData.yaml'
    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
