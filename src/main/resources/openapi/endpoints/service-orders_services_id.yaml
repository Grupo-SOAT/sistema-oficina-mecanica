parameters:
  - in: path
    name: id
    required: true
    schema:
      type: integer
      format: int64

get:
  tags: [ Service Orders ]
  summary: Obter OS por ID
  operationId: getServiceOrderById
  security:
    - SessionToken: [ ]
  responses:
    '200':
      description: Recurso
      content:
        application/json:
          schema:
            $ref: '../schemas/ServiceOrderData.yaml'

    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

    '404':
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

patch:
  tags: [ Service Orders ]
  summary: Atualizar OS
  operationId: updateServiceOrder
  security:
    - SessionToken: [ ]
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/ServiceOrderData.yaml'

  responses:
    '200':
      description: Recurso
      content:
        application/json:
          schema:
            $ref: '../schemas/ServiceOrderData.yaml'

    '400':
      description: Inválido
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

    '404':
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

delete:
  tags: [ Service Orders ]
  summary: Deletar OS
  operationId: deleteServiceOrder
  security:
    - SessionToken: [ ]

  responses:
    '202':
      description: Aceito

    '401':
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

    '403':
      description: Não autorizado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'

    '404':
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '../schemas/ErrorResponse.yaml'
