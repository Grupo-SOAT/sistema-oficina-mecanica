server.port=8080

# H2 in-memory database for local development
spring.datasource.url=jdbc:h2:mem:localdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console (acesso via http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Mock
config.api.mock.reports.average-time.enabled=true

# Security (valores fixos para desenvolvimento local)
security.jwt.secret=local-dev-secret-key-for-testing-only
user.password.default=default123
authentication.chatbot.api.key=local-chatbot-api-key
