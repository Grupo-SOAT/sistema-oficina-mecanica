server.port=8080

# PostgreSQL local (ex.: docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/workshop}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# Seed canonico local
app.seed.enabled=true
app.seed.locations=classpath:db/seed/canonical-seed.sql

# Security (valores fixos para desenvolvimento local)
security.jwt.secret=local-dev-secret-key-for-testing-only
user.password.default=default123
authentication.chatbot.api.key=local-chatbot-api-key
