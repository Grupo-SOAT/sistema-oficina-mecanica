# Spring Boot Test Configuration - PostgreSQL Testcontainers

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Seed can¶nico
app.seed.enabled=true
app.seed.locations=classpath:db/seed/canonical-seed.sql

# Logging
logging.level.root=WARN
logging.level.org.springframework.web=DEBUG
logging.level.br.com.fiap.postech=DEBUG

# Security (valores fixos apenas para testes)
security.jwt.secret=test-secret-key-for-unit-tests-only-32chars
user.password.default=test-default-password
authentication.chatbot.api.key=chatbot-123
