apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workshop-backend-hpa
  namespace: oficina-mecanica

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workshop-backend

  minReplicas: 1
  maxReplicas: 2

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0

    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max