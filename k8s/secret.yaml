apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  JWT_SECRET: "${JWT_SECRET}"
  API_KEY_CHATBOT: "${API_KEY_CHATBOT}"
  SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  DEFAULT_USER_PASSWORD: "${DEFAULT_USER_PASSWORD}"